id: es-medicine
name: "Medicina (Español)"
native_name: "Medicina"
type: vocabulary
status: experimental
version: 0.1.0

description: >
  Vocabulario técnico médico en español. Cubre terminología clínica,
  anatomía, fisiología, farmacología, patología y epidemiología.
  Diseñado para tesis en ciencias de la salud e investigación biomédica.

