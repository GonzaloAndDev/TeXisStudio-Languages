id: es-mathematics
name: "Matemáticas Avanzadas (Español)"
native_name: "Matemáticas"
type: vocabulary
status: experimental
version: 0.1.0

description: >
  Vocabulario de matemáticas avanzadas en español. Cubre álgebra lineal,
  cálculo, estadística, topología, análisis numérico y lógica matemática.
  Independiente — combinable con cualquier otro paquete de vocabulario.

