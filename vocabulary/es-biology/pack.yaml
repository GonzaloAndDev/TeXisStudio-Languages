id: es-biology
name: "Biología (Español)"
native_name: "Biología"
type: vocabulary
status: experimental
version: 0.1.0

description: >
  Vocabulario técnico de biología en español. Cubre biología celular y
  molecular, genética, ecología, evolución, microbiología y biotecnología.
  Diseñado para tesis en ciencias biológicas y de la salud.

