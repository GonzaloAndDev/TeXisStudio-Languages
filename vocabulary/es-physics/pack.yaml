id: es-physics
name: "Física (Español)"
native_name: "Física"
type: vocabulary
status: experimental
version: 0.1.0

description: >
  Vocabulario técnico de física en español. Cubre mecánica clásica,
  termodinámica, electromagnetismo, óptica, mecánica cuántica y
  física del estado sólido. Ideal para tesis en ciencias básicas.

maintainers:
  - name: TeXisStudio Community
    contact: https://github.com/GonzaloAndDev/TeXisStudio-Languages

base_language_hint: es

