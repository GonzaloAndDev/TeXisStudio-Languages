id: es-economics
name: "Economía y Negocios (Español)"
native_name: "Economía"
type: vocabulary
status: experimental
version: 0.1.0

description: >
  Vocabulario técnico de economía, administración y negocios en español.
  Cubre microeconomía, macroeconomía, econometría, finanzas, contabilidad
  y administración de empresas. Ideal para tesis en ciencias sociales y
  ciencias económico-administrativas.

maintainers:
  - name: TeXisStudio Community
    contact: https://github.com/GonzaloAndDev/TeXisStudio-Languages

base_language_hint: es

