id: es-law
name: "Derecho (Español)"
native_name: "Derecho"
type: vocabulary
status: experimental
version: 0.1.0

description: >
  Vocabulario jurídico en español. Cubre derecho civil, penal,
  constitucional, administrativo, mercantil, laboral e internacional.
  Diseñado para tesis en derecho y ciencias sociales en contexto
  latinoamericano e iberoamericano.

maintainers:
  - name: TeXisStudio Community
    contact: https://github.com/GonzaloAndDev/TeXisStudio-Languages

base_language_hint: es

