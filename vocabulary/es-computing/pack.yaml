id: es-computing
name: "Computación (Español)"
native_name: "Computación"
type: vocabulary
status: experimental
version: 0.1.0

description: >
  Vocabulario técnico de ciencias de la computación en español.
  Cubre estructuras de datos, sistemas operativos, redes, inteligencia
  artificial, bases de datos y seguridad informática. Para tesis en
  computación, sistemas e ingeniería de software.

maintainers:
  - name: TeXisStudio Community
    contact: https://github.com/GonzaloAndDev/TeXisStudio-Languages

