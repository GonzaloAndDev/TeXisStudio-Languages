id: es-chemistry
name: "Química (Español)"
native_name: "Química"
type: vocabulary
status: experimental
version: 0.1.0

description: >
  Vocabulario técnico de química en español. Cubre terminología de
  química general, orgánica, inorgánica, analítica, fisicoquímica
  y bioquímica. Diseñado para tesis en ciencias exactas y naturales.

maintainers:
