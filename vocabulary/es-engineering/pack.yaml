id: es-engineering
name: "Ingeniería (Español)"
native_name: "Ingeniería"
type: vocabulary
status: experimental
version: 0.1.0

description: >
  Vocabulario técnico de ingeniería en español. Cubre terminología de
  ingeniería civil, mecánica, eléctrica, electrónica y de sistemas.
  Independiente del paquete de idioma base — se puede usar solo o
  combinado con el paquete de español y/u otros vocabularios.

maintainers:
  - name: TeXisStudio Community
    contact: https://github.com/GonzaloAndDev/TeXisStudio-Languages

# Este paquete es completamente independiente.
# Compatible con cualquier base language que use caracteres latinos.
base_language_hint: es  # sugerencia (no restricción)

# Fuente: terminología estándar de ingeniería en español.
# Los términos son aceptados en todos los diccionarios regionales de español.
