id: nah
name: Nahuatl
native_name: "Nāhuatl"
flag: "🌵"
status: experimental
version: 1.0.0

maintainers:
  - name: TeXisStudio Community
    note: "Seeking native Nahuatl speakers — contributions welcome"

capabilities:
  ui: true
  spelling: false         # No Hunspell dictionary for Nahuatl exists yet.
                          # Contribution welcome: see community/dictionaries/README.md
  autocorrect: false
  grammar_remote: false   # LanguageTool does not support Nahuatl
  grammar_local: false
  latex_babel: false      # babel has no Nahuatl support
  latex_polyglossia: false

notes:
  - Translations are experimental — native speaker review is strongly encouraged.
  - Orthography follows INALI guidelines (SEP/UNAM modern standard).
  - Latin script with macrons for long vowels (ā, ē, ī, ō).
  - XeLaTeX recommended for proper Unicode rendering.
  - No Hunspell dictionary available; contributions from native speakers welcome.
  - Grammar check: LanguageTool does not yet support Nahuatl (hi-IN used as fallback placeholder).

latex:
  engine: xelatex
  font: "Noto Serif"
  encoding: UTF-8
  chapter_name: "Centlamantli"
  bibliography_name: "Tlahtolnextilihtzin"
  figure_name: "Tlaixnextiloni"
  table_name: "Tlahcuilōamaitl"
  abstract_name: "Ioltenehualiztli"
  contents_name: "Tlapohualamaitl"
