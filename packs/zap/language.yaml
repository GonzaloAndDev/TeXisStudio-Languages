id: zap
name: Zapotec
native_name: "Diidxazá"
flag: "🦋"
status: experimental
version: 1.0.0

maintainers:
  - name: TeXisStudio Community
    note: "Seeking native Zapotec speakers — contributions welcome. This pack now uses a hardened multi-source spelling seed."

capabilities:
  ui: true
  spelling: true          # Experimental seed Hunspell dictionary; native-speaker and licensing review required.
  autocorrect: false
  grammar_remote: false   # LanguageTool does not support Zapotec
  grammar_local: false
  latex_babel: false
  latex_polyglossia: false

notes:
  - Translations are experimental — native speaker review strongly encouraged.
  - "'Diidxazá' = Zapotec language (Isthmus variety self-designation)."
  - "'Binnizá' = Zapotec people."
  - Hardened Zapotec seed merges multiple clearly labeled Zapotec varieties.
  - Sources include San Juan Jaltepec/Santiago Yaveo, Isthmus Zapotec/Juchitán, San Bartolo Yautepec, and Teotitlán del Valle.
  - Treat the spelling dictionary as broad experimental aid data, not as a normative or pan-variant dictionary.
  - Recommended future split: zai for Isthmus Zapotec plus separate local metadata for the other varieties.
  - Source-specific license status needs manual review before any stable release.
  - Uses Latin script with apostrophe for glottal stop, tonal diacritics.
  - XeLaTeX recommended for proper Unicode rendering.
  - No LanguageTool support available.

latex:
  engine: xelatex
  font: "Noto Serif"
  encoding: UTF-8
  chapter_name: "Neza diidxa'"
  bibliography_name: "Diidxa' guendanabani"
  figure_name: "Guiropa"
  table_name: "Diidxa' neza"
  abstract_name: "Neza diidxa'"
  contents_name: "Guendaranaxhii"
