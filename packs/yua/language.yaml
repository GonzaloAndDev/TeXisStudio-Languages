id: yua
name: Yucatec Maya
native_name: "Maaya t'aan"
flag: "🌿"
status: experimental
version: 1.0.0

maintainers:
  - name: TeXisStudio Community
    note: "Seeking native Maya Yucatec speakers — contributions welcome"

capabilities:
  ui: true
  spelling: true          # Experimental seed Hunspell dictionary; native-speaker and licensing review required.
  autocorrect: false
  grammar_remote: false   # LanguageTool does not support Yucatec Maya
  grammar_local: false
  latex_babel: false      # babel has no Yucatec Maya support
  latex_polyglossia: false

notes:
  - Translations are experimental — native speaker review is strongly encouraged.
  - Orthography follows the unified Maya alphabet (alfabeto maya unificado, INALI 2014).
  - Uses Latin script; glottal stop written as apostrophe (').
  - XeLaTeX recommended for correct rendering of special characters.
  - Includes an experimental spelling seed from an introductory Spanish-Maya / Maya-Spanish source.
  - This package targets Yucatec Maya / Maya Peninsular, not all Mayan languages.
  - Source license status needs manual review before any stable release.
  - No LanguageTool grammar support.

latex:
  engine: xelatex
  font: "Noto Serif"
  encoding: UTF-8
  chapter_name: "Ts'íib"
  bibliography_name: "U ts'íibil t'aano'ob"
  figure_name: "Náajil"
  table_name: "Ts'íibta'ab"
  abstract_name: "U na'atil"
  contents_name: "U náajil ts'íibo'ob"
