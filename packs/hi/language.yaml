id: hi
name: Hindi
native_name: हिन्दी
flag: "🇮🇳"
status: beta
version: 1.0.0

maintainers:
  - name: TeXisStudio Community

capabilities:
  ui: true
  spelling: false         # No reliable open-source Hunspell Hindi dictionary.
                          # Contribution welcome: see community/dictionaries/README.md
  autocorrect: false      # Devanagari input via IME; autocorrect rules not yet available
  grammar_remote: false   # LanguageTool Hindi support is limited (hi-IN)
  grammar_local: false
  latex_babel: false      # babel does not support Hindi/Devanagari well
  latex_polyglossia: true # \setmainlanguage{hindi} with fontspec

notes:
  - XeLaTeX required for Devanagari rendering.
  - Recommended font: Lohit Devanagari, Noto Sans Devanagari, or Mangal.
  - Input via IME (e.g. Google Input Tools, Windows IME).
  - Spell check will use browser-native IME correction only.

latex:
  polyglossia_name: hindi
  engine: xelatex
  font: "Lohit Devanagari"
  chapter_name: "अध्याय"
  bibliography_name: "संदर्भ सूची"
  figure_name: "आकृति"
  table_name: "तालिका"
  abstract_name: "सार"
  contents_name: "विषय-सूची"
