id: pt-BR
name: Portuguese (Brazil)
native_name: Português (Brasil)
flag: "🇧🇷"
status: stable
version: 1.0.0

maintainers:
  - name: TeXisStudio Community
    contact: https://github.com/GonzaloAndDev/TeXisStudio

capabilities:
  ui: true
  spelling: true          # Hunspell via dictionary-pt (npm)
  autocorrect: true
  grammar_remote: true    # LanguageTool pt-BR
  grammar_local: false
  latex_babel: true       # \usepackage[brazil]{babel}
  latex_polyglossia: true # \setmainlanguage[variant=brazilian]{portuguese}

spelling_source: "npm:dictionary-pt"
spelling_license: LGPL-2.1
grammar_lt_code: pt-BR

latex:
  babel_name: brazil
  polyglossia_name: portuguese
  polyglossia_options: "variant=brazilian"
  chapter_name: "Capítulo"
  bibliography_name: "Referências"
  figure_name: "Figura"
  table_name: "Tabela"
  abstract_name: "Resumo"
  contents_name: "Sumário"
  date_format: "\\today"
  abnt_compatible: true
