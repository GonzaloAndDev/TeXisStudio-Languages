id: ru
name: Russian
native_name: Русский
flag: "🇷🇺"
status: stable
version: 1.0.0

maintainers:
  - name: TeXisStudio Community
    contact: https://github.com/GonzaloAndDev/TeXisStudio

capabilities:
  ui: true
  spelling: true          # Hunspell via dictionary-ru (npm)
  autocorrect: true
  grammar_remote: true    # LanguageTool ru-RU
  grammar_local: false
  latex_babel: true       # \usepackage[russian]{babel}
  latex_polyglossia: true # \setmainlanguage{russian}

spelling_source: "vendor:dictionaries/ru (upstream dictionary-ru)"
spelling_license: LGPL-2.1
grammar_lt_code: ru-RU

latex:
  babel_name: russian
  polyglossia_name: russian
  font_encoding: T2A
  xelatex_font: "Linux Libertine O"
  chapter_name: "Глава"
  bibliography_name: "Список литературы"
  figure_name: "Рисунок"
  table_name: "Таблица"
  abstract_name: "Аннотация"
  contents_name: "Содержание"
