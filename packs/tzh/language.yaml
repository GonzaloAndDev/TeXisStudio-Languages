id: tzh
name: Tzeltal
native_name: "Batz'il k'op"
flag: "🌄"
status: experimental
version: 1.0.0

maintainers:
  - name: TeXisStudio Community
    note: "Seeking native Tzeltal speakers from Chiapas — contributions welcome"

capabilities:
  ui: true
  spelling: false         # No Hunspell dictionary for Tzeltal exists yet.
  autocorrect: false
  grammar_remote: false   # LanguageTool does not support Tzeltal
  grammar_local: false
  latex_babel: false
  latex_polyglossia: false

notes:
  - Translations are experimental — native speaker review strongly encouraged.
  - "'Batz''il k''op' = true word/true language (Tzeltal self-designation)."
  - Orthography follows INALI Tzeltal guidelines; uses Latin script with ejectives (').
  - Spoken primarily in Chiapas (Oxchuc, Tenejapa, Amatenango, etc.).
  - XeLaTeX recommended for proper Unicode support.
  - No Hunspell dictionary or LanguageTool support available.

latex:
  engine: xelatex
  font: "Noto Serif"
  encoding: UTF-8
  chapter_name: "Nopel"
  bibliography_name: "U ts'ibajel k'optik"
  figure_name: "Ilel"
  table_name: "Ts'ibajel"
  abstract_name: "Na'el"
  contents_name: "Meltzanel"
